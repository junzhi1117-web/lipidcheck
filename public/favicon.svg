<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#227080"/>
      <stop offset="100%" stop-color="#0F4855"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <circle cx="50" cy="35" r="28" fill="white" opacity="0.04"/>

  <!-- ECG waveform: baseline → P wave → QRS complex → T wave → baseline -->
  <polyline
    points="6,50 22,50 25,44 28,50 33,50 36,63 41,15 46,59 50,50 55,50 58,37 64,50 94,50"
    stroke="white"
    stroke-width="5.2"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Gold accent dot at R-wave peak (highest point = most important signal) -->
  <circle cx="41" cy="15" r="3.5" fill="#C8943A"/>
</svg>
