<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Purple rounded square background -->
  <rect width="100" height="100" rx="22" fill="#5B4FCF"/>

  <!-- White blood drop: pointed top, round bottom -->
  <!-- The drop is centered at x=50, top point y=13, bottom circle center ~y=64, radius ~26 -->
  <path d="M50 13 C50 13 78 46 78 64 A28 28 0 0 1 22 64 C22 46 50 13 50 13Z" fill="white"/>

  <!-- Purple checkmark inside the drop (positioned in lower circle area) -->
  <polyline
    points="34,63 44,74 66,50"
    stroke="#5B4FCF"
    stroke-width="7"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
